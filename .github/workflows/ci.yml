name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install shellcheck (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install shellcheck

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run -a npm run test

      - name: Test (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run test
